<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академия Прокуратуры - Дневник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .login-card {
            background: rgba(255,255,255,0.98);
            border-radius: 40px;
            padding: 50px;
            max-width: 450px;
            margin: 80px auto;
            text-align: center;
        }
        .login-card h1 { background: linear-gradient(135deg, #1e3a5f, #2c5282); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-card input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 28px; }
        .login-card button { width: 100%; padding: 14px; background: #1e3a5f; color: white; border: none; border-radius: 28px; cursor: pointer; font-weight: bold; }
        .main-panel { background: rgba(255,255,255,0.96); border-radius: 40px; padding: 30px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        .add-cadet-form { background: #f1f5f9; border-radius: 24px; padding: 20px; margin-bottom: 30px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 140px; }
        .form-group label { font-size: 0.7rem; text-transform: uppercase; color: #64748b; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 16px; }
        .add-cadet-form button { background: #10b981; color: white; border: none; padding: 10px 24px; border-radius: 20px; cursor: pointer; }
        .table-wrapper { overflow-x: auto; border-radius: 20px; border: 1px solid #eef2f8; }
        .grades-table { width: 100%; border-collapse: collapse; background: white; }
        .grades-table th { background: #1e3a5f; color: white; padding: 14px 8px; }
        .grades-table td { padding: 12px 8px; border-bottom: 1px solid #eef2f8; text-align: center; }
        .grades-table td:first-child { text-align: left; font-weight: bold; }
        .grade-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; margin: 2px; cursor: pointer; background: #e0e7ff; }
        .grade-badge.absent { background: #fee2e2; color: #b91c1c; }
        .grade-badge.task { background: #fef3c7; color: #92400e; }
        .grade-control { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
        .grade-select { padding: 6px 10px; border-radius: 20px; }
        .action-btn { width: 32px; height: 32px; border-radius: 20px; border: none; cursor: pointer; }
        .action-btn.add { background: #2c5282; color: white; }
        .action-btn.del-last { background: #fee2e2; color: #b91c1c; }
        .delete-cadet-btn { background: #fee2e2; border: none; width: 32px; height: 32px; border-radius: 20px; cursor: pointer; }
        .avg-cell { background: #ecfdf5; font-weight: bold; color: #065f46; }
        .status { position: fixed; bottom: 15px; right: 15px; background: #1e293b; color: white; padding: 6px 16px; border-radius: 40px; font-size: 0.7rem; }
        .legend { display: flex; gap: 20px; justify-content: center; margin-top: 20px; font-size: 0.7rem; flex-wrap: wrap; }
        .error { color: #dc2626; margin-top: 10px; }
        .setup-card { background: #fef3c7; border-radius: 24px; padding: 20px; margin-bottom: 20px; text-align: left; display: none; }
        .setup-card input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 12px; border: 1px solid #fde68a; }
        .setup-card button { background: #92400e; color: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div id="status" class="status">✨ Готово</div>

    <div id="loginForm">
        <div class="login-card">
            <div style="font-size: 3rem;">⚖️</div>
            <h1>Академия Прокуратуры</h1>
            <div style="color:#64748b; margin-bottom:20px;">электронный журнал</div>
            
            <div id="setupPanel" class="setup-card">
                <h4>📡 Настройка синхронизации</h4>
                <input type="text" id="setupUsername" placeholder="Логин GitHub">
                <input type="text" id="setupRepo" placeholder="Название репозитория">
                <button id="saveSetupBtn">💾 Сохранить настройки</button>
            </div>
            
            <input type="text" id="loginInput" placeholder="Логин">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <div id="loginError" class="error"></div>
            <div style="margin-top:20px; font-size:0.7rem;">Преподаватель: <strong>teacher</strong> / <strong>123</strong></div>
        </div>
    </div>

    <div id="teacherPanel" style="display: none;">
        <div class="main-panel">
            <div class="panel-header">
                <h1>📖 Журнал успеваемости</h1>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
            <div class="add-cadet-form">
                <h3>➕ Добавить курсанта</h3>
                <div class="form-row">
                    <div class="form-group"><label>Фамилия</label><input type="text" id="newSurname"></div>
                    <div class="form-group"><label>Имя</label><input type="text" id="newName"></div>
                    <div class="form-group"><label>Отчество</label><input type="text" id="newPatronymic"></div>
                    <button id="addCadetBtn">➕ Добавить</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="grades-table" id="gradesTable">
                    <thead id="tableHeader"><tr><th>👤 ФИО</th><th>Военно Тактическая</th><th>Русский язык</th><th>Юридический</th><th>Средний</th><th></th></tr></thead>
                    <tbody id="tableBody"><tr><td colspan="6" class="empty-row">Загрузка...</td></tr></tbody>
                </table>
            </div>
            <div class="legend">
                <span>🔵 Оценка</span><span>🔴 Не пришёл</span><span>🟡 Отработка</span>
                <span>🔴 Клик по оценке — удаление</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // ВСТАВЬТЕ ВАШ ТОКЕН СЮДА (ЗАМЕНИТЕ НА ghp_...)
    // ============================================
    const GITHUB_TOKEN = "ВАШ_ТОКЕН";  // ← СЮДА ВСТАВЬТЕ ВАШ ТОКЕН
    // ============================================
    
    let CONFIG = null;
    let appData = null;
    let currentUser = null;
    let syncTimer = null;
    
    const SUBJECTS = ["Военно Тактическая Подготовка", "Русский язык", "Юридический"];
    const STORAGE_CONFIG_KEY = "diary_config";
    
    function loadConfig() {
        const saved = localStorage.getItem(STORAGE_CONFIG_KEY);
        if (saved) {
            CONFIG = JSON.parse(saved);
            document.getElementById('setupPanel').style.display = 'none';
            return true;
        }
        document.getElementById('setupPanel').style.display = 'block';
        return false;
    }
    
    function saveConfig(username, repo) {
        CONFIG = { username, repo, token: GITHUB_TOKEN };
        localStorage.setItem(STORAGE_CONFIG_KEY, JSON.stringify({ username, repo }));
        document.getElementById('setupPanel').style.display = 'none';
        return true;
    }
    
    async function loadFromGitHub() {
        if (!CONFIG) return false;
        try {
            const url = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/data.json`;
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (res.ok) {
                const data = await res.json();
                const content = JSON.parse(atob(data.content));
                appData = content;
                localStorage.setItem("diary_backup", JSON.stringify(appData));
                return true;
            } else if (res.status === 404) {
                appData = { users: [{ id: "t1", login: "teacher", password: "123", role: "teacher" }], cadets: [] };
                await saveToGitHub();
                return true;
            }
            return false;
        } catch(e) {
            const local = localStorage.getItem("diary_backup");
            if (local) appData = JSON.parse(local);
            return false;
        }
    }
    
    async function saveToGitHub() {
        if (!CONFIG || !appData) return false;
        localStorage.setItem("diary_backup", JSON.stringify(appData));
        try {
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(appData, null, 2))));
            let sha = null;
            const getRes = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/data.json`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (getRes.ok) {
                const info = await getRes.json();
                sha = info.sha;
            }
            await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/data.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: `Обновление ${new Date().toLocaleString()}`,
                    content: content,
                    sha: sha,
                    branch: 'main'
                })
            });
            return true;
        } catch(e) { return false; }
    }
    
    function getCadets() { return appData?.cadets || []; }
    function fullName(c) { return `${c.surname} ${c.name} ${c.patronymic}`.trim(); }
    
    function getNumericValue(mark) {
        if (mark === 'н' || mark === 'о') return 0;
        let num = parseInt(mark);
        return isNaN(num) ? 0 : num;
    }
    
    function getAllNumericGrades(cadet) {
        let values = [];
        SUBJECTS.forEach(subj => {
            if (cadet.grades?.[subj]) {
                cadet.grades[subj].forEach(m => values.push(getNumericValue(m)));
            }
        });
        return values;
    }
    
    function avgFromArray(arr) {
        if (!arr.length) return "—";
        return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1);
    }
    
    async function addCadet(surname, name, patronymic) {
        let newId = "c" + Date.now();
        let gradesInit = {};
        SUBJECTS.forEach(s => gradesInit[s] = []);
        appData.cadets.push({ id: newId, surname, name, patronymic, grades: gradesInit });
        await saveToGitHub();
        renderTeacherTable();
    }
    
    async function deleteCadet(id) {
        appData.cadets = appData.cadets.filter(c => c.id !== id);
        await saveToGitHub();
        renderTeacherTable();
    }
    
    async function addMark(cid, subj, markValue) {
        let c = appData.cadets.find(c => c.id === cid);
        if (!c) return;
        if (!c.grades[subj]) c.grades[subj] = [];
        c.grades[subj].push(markValue);
        await saveToGitHub();
        renderTeacherTable();
    }
    
    async function deleteMarkByIndex(cid, subj, index) {
        let c = appData.cadets.find(c => c.id === cid);
        if (c && c.grades[subj] && c.grades[subj][index] !== undefined) {
            c.grades[subj].splice(index, 1);
            await saveToGitHub();
            renderTeacherTable();
        }
    }
    
    async function removeLastMark(cid, subj) {
        let c = appData.cadets.find(c => c.id === cid);
        if (c && c.grades[subj]?.length) {
            c.grades[subj].pop();
            await saveToGitHub();
            renderTeacherTable();
        }
    }
    
    function getMarkDisplay(mark) {
        if (mark === 'н') return '❌ н';
        if (mark === 'о') return '📋 о';
        return mark;
    }
    
    function getMarkClass(mark) {
        if (mark === 'н') return 'absent';
        if (mark === 'о') return 'task';
        return 'normal';
    }
    
    function renderTeacherTable() {
        const thead = document.getElementById("tableHeader");
        const tbody = document.getElementById("tableBody");
        if (!thead || !tbody) return;
        let cadets = getCadets();
        let headerHtml = `<tr><th>👤 ФИО</th>${SUBJECTS.map(s => `<th>${s}</th>`).join('')}<th>Средний</th><th></th></tr>`;
        thead.innerHTML = headerHtml;
        if (!cadets.length) {
            tbody.innerHTML = `<td><td colspan="6" class="empty-row">📭 Нет курсантов</td><\/tr>`;
            return;
        }
        tbody.innerHTML = '';
        for (let cadet of cadets) {
            let totalAvg = avgFromArray(getAllNumericGrades(cadet));
            let row = document.createElement('tr');
            let nameCell = document.createElement('td');
            nameCell.innerText = fullName(cadet);
            nameCell.style.fontWeight = 'bold';
            row.appendChild(nameCell);
            for (let subj of SUBJECTS) {
                let marks = cadet.grades[subj] || [];
                let td = document.createElement('td');
                let marksDiv = document.createElement('div');
                marksDiv.className = 'grades-list';
                for (let i = 0; i < marks.length; i++) {
                    let badge = document.createElement('span');
                    badge.className = `grade-badge ${getMarkClass(marks[i])}`;
                    badge.innerText = getMarkDisplay(marks[i]);
                    badge.style.cursor = 'pointer';
                    badge.onclick = () => deleteMarkByIndex(cadet.id, subj, i);
                    marksDiv.appendChild(badge);
                }
                td.appendChild(marksDiv);
                let controlDiv = document.createElement('div');
                controlDiv.className = 'grade-control';
                let select = document.createElement('select');
                select.className = 'grade-select';
                ['2','3','4','5','н','о'].forEach(opt => {
                    let option = document.createElement('option');
                    option.value = opt;
                    option.innerText = opt === 'н' ? '❌ не пришёл' : (opt === 'о' ? '📋 отработка' : opt);
                    select.appendChild(option);
                });
                let addBtn = document.createElement('button');
                addBtn.innerText = '+';
                addBtn.className = 'action-btn add';
                addBtn.onclick = () => addMark(cadet.id, subj, select.value);
                let delLastBtn = document.createElement('button');
                delLastBtn.innerText = '🗑️';
                delLastBtn.className = 'action-btn del-last';
                delLastBtn.onclick = () => { if (marks.length) removeLastMark(cadet.id, subj); };
                controlDiv.appendChild(select);
                controlDiv.appendChild(addBtn);
                controlDiv.appendChild(delLastBtn);
                td.appendChild(controlDiv);
                row.appendChild(td);
            }
            let avgCell = document.createElement('td');
            avgCell.className = 'avg-cell';
            avgCell.innerText = totalAvg;
            let actionCell = document.createElement('td');
            let delBtn = document.createElement('button');
            delBtn.innerText = '🗑️';
            delBtn.className = 'delete-cadet-btn';
            delBtn.onclick = () => { if (confirm('Удалить курсанта?')) deleteCadet(cadet.id); };
            actionCell.appendChild(delBtn);
            row.appendChild(avgCell);
            row.appendChild(actionCell);
            tbody.appendChild(row);
        }
    }
    
    function startAutoSync() {
        if (syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(async () => {
            if (CONFIG && currentUser) {
                const old = JSON.stringify(appData);
                await loadFromGitHub();
                if (old !== JSON.stringify(appData)) renderTeacherTable();
            }
        }, 5000);
    }
    
    function login(loginVal, pwd) {
        if (loginVal === 'teacher' && pwd === '123') {
            currentUser = { id: 't1', role: 'teacher' };
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('teacherPanel').style.display = 'block';
            renderTeacherTable();
            startAutoSync();
            return true;
        }
        document.getElementById('loginError').innerText = 'Неверный логин или пароль';
        return false;
    }
    
    function logout() {
        currentUser = null;
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('teacherPanel').style.display = 'none';
    }
    
    document.getElementById('loginBtn').onclick = () => login(document.getElementById('loginInput').value.trim(), document.getElementById('passwordInput').value.trim());
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('addCadetBtn').onclick = () => {
        let surname = document.getElementById('newSurname').value.trim();
        let name = document.getElementById('newName').value.trim();
        let patronymic = document.getElementById('newPatronymic').value.trim();
        if (surname && name && patronymic) {
            addCadet(surname, name, patronymic);
            document.getElementById('newSurname').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newPatronymic').value = '';
        } else alert('Заполните все поля');
    };
    document.getElementById('saveSetupBtn').onclick = () => {
        let username = document.getElementById('setupUsername').value.trim();
        let repo = document.getElementById('setupRepo').value.trim();
        if (username && repo) {
            saveConfig(username, repo);
            loadFromGitHub().then(() => renderTeacherTable());
        } else alert('Заполните логин и репозиторий');
    };
    
    document.addEventListener('DOMContentLoaded', () => {
        loadConfig();
        const local = localStorage.getItem("diary_backup");
        if (local) appData = JSON.parse(local);
        if (CONFIG) loadFromGitHub().then(() => renderTeacherTable());
        document.getElementById('loginForm').style.display = 'block';
    });
</script>
</body>
</html>
