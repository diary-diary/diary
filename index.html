<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронный дневник - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ФОРМА ВХОДА -->
        <div id="login-form">
            <h1>📓 Электронный дневник</h1>
            <div class="card">
                <h2>Авторизация</h2>
                <label>Логин:</label>
                <input type="text" id="login" placeholder="teacher или cadet">
                <label>Пароль:</label>
                <input type="password" id="password" placeholder="123">
                <button id="doLogin">Войти</button>
                <div id="errorMsg" class="error"></div>
            </div>
        </div>

        <!-- ПАНЕЛЬ ПРЕПОДАВАТЕЛЯ -->
        <div id="teacherPanel" style="display: none;">
            <div class="header-flex">
                <h1>👨‍🏫 Панель преподавателя</h1>
                <button id="logoutTeacher" class="logout">Выйти</button>
            </div>
            <hr>

            <!-- Форма добавления курсанта (без класса) -->
            <div class="add-cadet-form">
                <h3>➕ Добавить курсанта</h3>
                <input type="text" id="newName" placeholder="Имя">
                <input type="text" id="newSurname" placeholder="Фамилия">
                <input type="text" id="newLogin" placeholder="Логин">
                <input type="password" id="newPass" placeholder="Пароль">
                <button id="addCadetBtn">Добавить</button>
            </div>

            <!-- Большой список курсантов в виде карточек -->
            <h3>👥 Список курсантов</h3>
            <div id="cadetsGrid" class="cadets-grid"></div>

            <!-- Блок с оценками выбранного курсанта -->
            <div id="gradesBlock" style="display: none;">
                <h2 id="selectedCadetName"></h2>
                <table id="gradesTable">
                    <thead>
                        <tr><th>Предмет</th><th>Оценки</th><th>Средний балл</th><th>Действие</th></tr>
                    </thead>
                    <tbody id="gradesBody"></tbody>
                </table>
                <div class="add-grade-form">
                    <select id="subjectForGrade">
                        <option>Военно Тактическая Подготовка</option>
                        <option>Русский язык</option>
                        <option>Юридический</option>
                    </select>
                    <input type="number" id="newGrade" min="2" max="5" placeholder="Оценка 2-5">
                    <button id="addGradeBtn">Поставить оценку</button>
                </div>
            </div>
        </div>

        <!-- ПАНЕЛЬ КУРСАНТА (только просмотр) -->
        <div id="cadetPanel" style="display: none;">
            <div class="header-flex">
                <h1>📘 Дневник курсанта</h1>
                <button id="logoutCadet" class="logout">Выйти</button>
            </div>
            <div id="cadetInfo"></div>
            <table id="cadetGrades">
                <thead><tr><th>Предмет</th><th>Оценки</th><th>Средний балл</th></tr></thead>
                <tbody id="cadetGradesBody"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
