<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронный дневник</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b2d31; /* Темная тема */
            color: #ffffff;
            padding: 20px;
            margin: 0;
            position: relative;
            min-height: 100vh;
        }

        h2 {
            border-bottom: 2px solid #404249;
            padding-bottom: 10px;
            margin-bottom: 20px;
            max-width: 600px;
        }

        #diary-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 600px;
        }

        .diary-card {
            background-color: #313338;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .role-emoji {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-right: 15px;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-login {
            font-size: 16px;
            font-weight: bold;
        }

        .user-role {
            font-size: 13px;
            color: #b5bac1;
            margin-top: 4px;
        }

        .status-message {
            color: #b5bac1;
            font-style: italic;
        }

        /* --- ИНТЕРФЕЙС НАСТРОЕК (СПРАВА) --- */

        /* Круглая кнопка-триггер в правом углу */
        .profile-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #35373c;
            border: 2px solid #5865f2;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 1000;
        }

        .profile-trigger:hover {
            transform: scale(1.05);
            background-color: #404249;
        }

        .profile-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Выпадающая панель настроек */
        .settings-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 300px;
            background-color: #1e1f22;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #313338;
            display: none; /* Скрыта по умолчанию */
            z-index: 999;
        }

        /* Класс для открытия панели */
        .settings-panel.active {
            display: block;
        }

        .settings-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #313338;
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: #f2f3f5;
        }

        .settings-header .gear-icon {
            font-size: 20px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .settings-section h4 {
            margin: 0 0 10px 0;
            color: #949ba4;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Зона изменения аватарки */
        .avatar-upload-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background-color: #2b2d31;
            padding: 15px;
            border-radius: 8px;
        }

        .preview-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #949ba4;
        }

        .upload-btn {
            background-color: #5865f2;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .upload-btn:hover {
            background-color: #4752c4;
        }

        /* Блок информации (запрещен для редактирования) */
        .read-only-info {
            background-color: #2b2d31;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-field {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 11px;
            color: #949ba4;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 14px;
            color: #f2f3f5;
            font-weight: 500;
            padding: 4px 0;
        }
    </style>
</head>
<body>

    <button class="profile-trigger" id="profileTriggerBtn" onclick="toggleSettings()">
        <img id="triggerAvatarImg" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Аватар">
    </button>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <span class="gear-icon">⚙️</span>
            <span>Настройки</span>
        </div>

        <div class="settings-section">
            <h4>Профиль</h4>
            
            <div class="avatar-upload-zone">
                <img id="panelAvatarImg" class="preview-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Просмотр">
                <input type="file" id="avatarFileInput" accept="image/*" style="display: none;" onchange="changeAvatar(event)">
                <button class="upload-btn" onclick="document.getElementById('avatarFileInput').click()">Сменить аватарку</button>
            </div>

            <h4>Информация (Только чтение)</h4>
            <div class="read-only-info">
                <div class="info-field">
                    <span class="info-label">Ваш Логин</span>
                    <span class="info-value" id="currentDbLogin">Загрузка...</span>
                </div>
                <div class="info-field">
                    <span class="info-label">Текущая Должность</span>
                    <span class="info-value" id="currentDbRole">Загрузка...</span>
                </div>
            </div>
        </div>
    </div>

    <h2>Список сотрудников и курсантов</h2>
    <div id="diary-container">
        <div class="status-message">Подключение к базе данных...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // КОНФИГУРАЦИЯ FIREBASE (Вставь свои ключи сюда)
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "diary-6f282.firebaseapp.com",
            databaseURL: "https://diary-6f282-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "diary-6f282",
            storageBucket: "diary-6f282.appspot.com",
            messagingSenderId: "ТВОЙ_SENDER_ID",
            appId: "ТВОЙ_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const customEmojis = {
            "Ректор": "./images/rector.png",
            "Советник": "./images/advisor.png",
            "Начальник академии": "./images/boss.png",
            "Проректор": "./images/prorector.png",
            "Декан": "./images/dean.png",
            "Куратор": "./images/curator.png",
            "Секретарь": "./images/secretary.png",
            "Заведующий": "./images/manager.png",
            "Преподаватель": "./images/teacher.png",
            "Руководитель ПК": "./images/head_pc.png",
            "Сотрудник ПК": "./images/staff_pc.png",
            "Курсант": "./images/student.png"
        };

        const container = document.getElementById('diary-container');
        const usersRef = ref(db, 'users');
        
        onValue(usersRef, (snapshot) => {
            container.innerHTML = ''; 

            if (!snapshot.exists()) {
                container.innerHTML = '<div class="status-message">База данных пуста или нет доступа.</div>';
                return;
            }

            let isFirst = true;

            snapshot.forEach((childSnapshot) => {
                const login = childSnapshot.key;
                const userData = childSnapshot.val();
                const role = userData.role || "Без должности";
                
                const iconSrc = customEmojis[role] || "https://cdn-icons-png.flaticon.com/512/847/847969.png";

                // ДЛЯ ДЕМОНСТРАЦИИ: берем первого попавшегося пользователя из базы 
                // и отображаем его данные в блоке информации "Только чтение" справа
                if (isFirst) {
                    document.getElementById('currentDbLogin').innerText = login;
                    document.getElementById('currentDbRole').innerText = role;
                    isFirst = false;
                }

                const cardHtml = `
                    <div class="diary-card">
                        <img src="${iconSrc}" alt="${role}" class="role-emoji" title="${role}">
                        <div class="user-info">
                            <span class="user-login">${login}</span>
                            <span class="user-role">${role}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }, (error) => {
            console.error(error);
            container.innerHTML = `<div class="status-message" style="color: #da373c;">Ошибка доступа к базе данных.</div>`;
        });
    </script>

    <script>
        // Открытие/закрытие панели настроек при клике на кружок
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('active');
        }

        // Закрытие панели при клике мимо неё
        window.addEventListener('click', function(e) {
            const panel = document.getElementById('settingsPanel');
            const trigger = document.getElementById('profileTriggerBtn');
            if (!panel.contains(e.target) && !trigger.contains(e.target)) {
                panel.classList.remove('active');
            }
        });

        // Функция обработки и сохранения аватарки в localStorage
        function changeAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    
                    // Сохраняем в память браузера
                    localStorage.setItem('userAvatar', base64Image);
                    
                    // Обновляем картинки на странице
                    document.getElementById('triggerAvatarImg').src = base64Image;
                    document.getElementById('panelAvatarImg').src = base64Image;
                }
                reader.readAsDataURL(file);
            }
        }

        // При загрузке страницы проверяем, сохранял ли пользователь аватарку ранее
        window.addEventListener('DOMContentLoaded', () => {
            const savedAvatar = localStorage.getItem('userAvatar');
            if (savedAvatar) {
                document.getElementById('triggerAvatarImg').src = savedAvatar;
                document.getElementById('panelAvatarImg').src = savedAvatar;
            }
        });
    </script>

</body>
</html>
