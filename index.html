<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Академия Прокуратуры - Электронный дневник</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0f1923, #0a1118);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.04"><path fill="white" d="M20,20 L30,10 L40,20 L30,30 Z M60,60 L70,50 L80,60 L70,70 Z M40,80 L45,75 L50,80 L45,85 Z"/><circle cx="80" cy="30" r="4"/><circle cx="15" cy="70" r="3"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Карточка входа */
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 48px 40px;
            max-width: 460px;
            margin: 80px auto;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.6s ease;
        }

        .login-card h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #1a3a4f, #2c6e8f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .login-card input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border: 2px solid #e2edf7;
            border-radius: 32px;
            font-size: 1rem;
        }

        .login-card input:focus {
            outline: none;
            border-color: #2c6e8f;
            box-shadow: 0 0 0 4px rgba(44,110,143,0.15);
        }

        .login-card button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(95deg, #1a3a4f, #2c6e8f);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        .login-card button:hover {
            transform: scale(1.02);
        }

        /* Главная панель */
        .main-panel {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 32px 36px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .panel-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1a3a4f, #2c6e8f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        /* Форма добавления */
        .add-cadet-form {
            background: rgba(245, 250, 255, 0.7);
            border-radius: 32px;
            padding: 28px 30px;
            margin-bottom: 40px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 150px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #4a627a;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: white;
            border: 1.5px solid #e2edf7;
            border-radius: 24px;
        }

        .add-cadet-form button {
            background: linear-gradient(95deg, #1e6f5c, #289672);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Таблица */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 28px;
        }

        .grades-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }

        .grades-table th {
            background: linear-gradient(105deg, #1a3a4f, #2c6e8f);
            color: white;
            padding: 16px 12px;
            font-weight: 600;
            text-align: center;
        }

        .grades-table th:first-child {
            text-align: left;
            padding-left: 20px;
        }

        .grades-table td {
            padding: 14px 8px;
            border-bottom: 1px solid #eef2f8;
            vertical-align: middle;
            text-align: center;
        }

        .grades-table td:first-child {
            text-align: left;
            padding-left: 20px;
            font-weight: 600;
            background: #fafdff;
        }

        .grades-table tr:hover td {
            background: #fafcff;
        }

        /* Список оценок */
        .grades-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .grade-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0 10px;
        }

        .grade-badge.normal {
            background: linear-gradient(145deg, #e0e7ff, #d1d9ff);
            color: #1e3a5f;
        }

        .grade-badge.absent {
            background: linear-gradient(145deg, #fee2e2, #fecaca);
            color: #b91c1c;
        }

        .grade-badge.task {
            background: linear-gradient(145deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        .grade-badge:hover {
            transform: scale(1.07);
        }

        /* Управление */
        .grade-control {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .grade-select {
            padding: 8px 10px;
            border: 1.5px solid #e2edf7;
            border-radius: 30px;
            font-size: 0.8rem;
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        .grade-select:focus {
            outline: none;
            border-color: #2c6e8f;
        }

        .action-btn {
            background: #eef3fc;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.add {
            background: #2c6e8f;
            color: white;
        }

        .action-btn.add:hover {
            background: #1a5a7a;
        }

        .action-btn.del {
            background: #fee2e2;
            color: #b91c1c;
        }

        .action-btn.del:hover {
            background: #fecaca;
        }

        .delete-cadet-btn {
            background: #fee2e2;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
        }

        .delete-cadet-btn:hover {
            background: #fecaca;
        }

        .avg-cell {
            background: #eef6f2;
            font-weight: 800;
            color: #1e6f5c;
        }

        .empty-row {
            text-align: center;
            padding: 50px;
            color: #7a8faa;
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 1000;
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,0,0,0.03);
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
        }

        .legend .badge-small {
            width: 28px;
            height: 28px;
            border-radius: 20px;
            display: inline-block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="status" class="status">✨ Система готова</div>

    <div id="loginForm">
        <div class="login-card">
            <h1>⚖️ Академия Прокуратуры</h1>
            <div class="subtitle" style="color:#5a6e8a; margin-bottom:20px;">электронный журнал</div>
            <input type="text" id="loginInput" placeholder="Логин преподавателя">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginBtn">Войти →</button>
            <div id="loginError" style="color:#c2410c; margin-top:12px;"></div>
            <div style="margin-top:28px; font-size:0.7rem; color:#6c84a0;">🔐 Преподаватель: <strong>teacher</strong> / <strong>123</strong></div>
        </div>
    </div>

    <div id="teacherPanel" style="display: none;">
        <div class="main-panel">
            <div class="panel-header">
                <h1>📖 Журнал успеваемости</h1>
                <button id="logoutTeacher" class="logout-btn">🚪 Выйти</button>
            </div>

            <div class="add-cadet-form">
                <h3 style="margin-bottom:16px; color:#1a3a4f;">➕ Добавить курсанта</h3>
                <div class="form-row">
                    <div class="form-group"><label>Фамилия</label><input type="text" id="newSurname" placeholder="Иванов"></div>
                    <div class="form-group"><label>Имя</label><input type="text" id="newName" placeholder="Иван"></div>
                    <div class="form-group"><label>Отчество</label><input type="text" id="newPatronymic" placeholder="Иванович"></div>
                    <button id="addCadetBtn">➕ Добавить</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="grades-table" id="gradesTable">
                    <thead id="tableHeader">
                        <tr><th>👤 Курсант</th><th>Военно Тактическая</th><th>Русский язык</th><th>Юридический</th><th>📊 Средний</th><th></th></tr>
                    </thead>
                    <tbody id="tableBody"><tr><td colspan="6" class="empty-row">Загрузка...</td></tr></tbody>
                </table>
            </div>

            <div class="legend">
                <span><div class="badge-small" style="background:#d1d9ff;"></div> Оценка (2-5)</span>
                <span><div class="badge-small" style="background:#fecaca;"></div> ❌ Не пришёл (н)</span>
                <span><div class="badge-small" style="background:#fde68a;"></div> 📋 Отработка (о)</span>
                <span>✏️ Клик по отметке — редактировать</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // РАСШИРЕННЫЙ ДНЕВНИК: оценки 2-5 + "н" + "о"
    // ============================================
    const STORAGE_KEY = "diary_extended_teacher";
    const SUBJECTS = ["Военно Тактическая Подготовка", "Русский язык", "Юридический"];
    
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!appData) {
        appData = {
            users: [{ id: "t1", login: "teacher", password: "123", role: "teacher", name: "Преподаватель" }],
            cadets: []
        };
    }
    
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        const st = document.getElementById('status');
        st.textContent = '💾 Сохранено';
        st.style.background = '#2c6e8f';
        setTimeout(() => { st.textContent = '✨ Готово'; st.style.background = '#1e293b'; }, 1200);
    }
    
    function getCadets() { return appData.cadets || []; }
    function getCadetById(id) { return appData.cadets.find(c => c.id === id); }
    function fullName(c) { return `${c.surname} ${c.name} ${c.patronymic}`.trim(); }
    
    // Числовое значение для расчёта среднего: 2-5, н=0, о=0
    function getNumericValue(mark) {
        if (mark === 'н' || mark === 'о') return 0;
        let num = parseInt(mark);
        return isNaN(num) ? 0 : num;
    }
    
    function getAllNumericGrades(cadet) {
        let values = [];
        SUBJECTS.forEach(subj => {
            if (cadet.grades?.[subj]) {
                cadet.grades[subj].forEach(m => values.push(getNumericValue(m)));
            }
        });
        return values;
    }
    
    function avgFromArray(arr) {
        if (!arr.length) return "—";
        let sum = arr.reduce((a,b)=>a+b,0);
        return (sum / arr.length).toFixed(1);
    }
    
    function addCadet(surname, name, patronymic) {
        let newId = "c"+Date.now();
        let gradesInit = {};
        SUBJECTS.forEach(s => gradesInit[s] = []);
        appData.cadets.push({ id:newId, surname, name, patronymic, grades: gradesInit });
        saveData();
        return true;
    }
    
    function deleteCadet(id) {
        appData.cadets = appData.cadets.filter(c => c.id !== id);
        saveData();
    }
    
    function addMark(cid, subj, markValue) {
        let c = getCadetById(cid);
        if (!c) return false;
        let allowed = ['2','3','4','5','н','о'];
        if (!allowed.includes(markValue)) return false;
        if (!c.grades[subj]) c.grades[subj] = [];
        c.grades[subj].push(markValue);
        saveData();
        return true;
    }
    
    function removeLastMark(cid, subj) {
        let c = getCadetById(cid);
        if (c && c.grades[subj]?.length) {
            c.grades[subj].pop();
            saveData();
            return true;
        }
        return false;
    }
    
    function editMark(cid, subj, idx, newValue) {
        let c = getCadetById(cid);
        let allowed = ['2','3','4','5','н','о'];
        if (c && c.grades[subj]?.[idx] && allowed.includes(newValue)) {
            c.grades[subj][idx] = newValue;
            saveData();
            return true;
        }
        return false;
    }
    
    // Отображение отметки с классом
    function getMarkDisplay(mark) {
        if (mark === 'н') return '❌ н';
        if (mark === 'о') return '📋 о';
        return mark;
    }
    
    function getMarkClass(mark) {
        if (mark === 'н') return 'absent';
        if (mark === 'о') return 'task';
        return 'normal';
    }
    
    function renderTeacherTable() {
        const thead = document.getElementById("tableHeader");
        const tbody = document.getElementById("tableBody");
        let cadets = getCadets();
        
        let headerHtml = `<tr><th>👤 Курсант</th>`;
        SUBJECTS.forEach(s => headerHtml += `<th>${s}</th>`);
        headerHtml += `<th>📊 Средний</th><th></th></tr>`;
        thead.innerHTML = headerHtml;
        
        if (!cadets.length) {
            tbody.innerHTML = `<tr><td colspan="${SUBJECTS.length+3}" class="empty-row">📭 Нет курсантов. Добавьте первого!</td></tr>`;
            return;
        }
        
        tbody.innerHTML = '';
        for (let cadet of cadets) {
            let numericGrades = getAllNumericGrades(cadet);
            let totalAvg = avgFromArray(numericGrades);
            
            let row = document.createElement('tr');
            let nameCell = document.createElement('td');
            nameCell.innerText = fullName(cadet);
            nameCell.style.fontWeight = 'bold';
            row.appendChild(nameCell);
            
            for (let subj of SUBJECTS) {
                let marks = cadet.grades[subj] || [];
                let td = document.createElement('td');
                
                // Список отметок
                let marksDiv = document.createElement('div');
                marksDiv.className = 'grades-list';
                for (let i=0; i<marks.length; i++) {
                    let badge = document.createElement('div');
                    badge.className = `grade-badge ${getMarkClass(marks[i])}`;
                    badge.innerText = getMarkDisplay(marks[i]);
                    badge.setAttribute('data-cid', cadet.id);
                    badge.setAttribute('data-subj', subj);
                    badge.setAttribute('data-idx', i);
                    badge.setAttribute('data-val', marks[i]);
                    badge.onclick = (e) => {
                        e.stopPropagation();
                        let newVal = prompt(`Изменить отметку "${marks[i]}" на новую (2,3,4,5,н,о):`, marks[i]);
                        if (newVal && ['2','3','4','5','н','о'].includes(newVal)) {
                            editMark(cadet.id, subj, i, newVal);
                            renderTeacherTable();
                        } else if (newVal) alert("Допустимые значения: 2,3,4,5,н,о");
                    };
                    marksDiv.appendChild(badge);
                }
                td.appendChild(marksDiv);
                
                // Панель добавления
                let controlDiv = document.createElement('div');
                controlDiv.className = 'grade-control';
                let select = document.createElement('select');
                select.className = 'grade-select';
                let options = ['2','3','4','5','н','о'];
                options.forEach(opt => {
                    let option = document.createElement('option');
                    option.value = opt;
                    option.innerText = opt === 'н' ? '❌ не пришёл' : (opt === 'о' ? '📋 отработка' : opt);
                    select.appendChild(option);
                });
                let addBtn = document.createElement('button');
                addBtn.innerText = '+';
                addBtn.className = 'action-btn add';
                addBtn.onclick = () => {
                    let val = select.value;
                    addMark(cadet.id, subj, val);
                    renderTeacherTable();
                };
                let delLastBtn = document.createElement('button');
                delLastBtn.innerText = '🗑️';
                delLastBtn.className = 'action-btn del';
                delLastBtn.onclick = () => {
                    if (marks.length && confirm('Удалить последнюю запись?')) {
                        removeLastMark(cadet.id, subj);
                        renderTeacherTable();
                    } else if (!marks.length) alert('Нет записей для удаления');
                };
                controlDiv.appendChild(select);
                controlDiv.appendChild(addBtn);
                controlDiv.appendChild(delLastBtn);
                td.appendChild(controlDiv);
                row.appendChild(td);
            }
            
            let avgCell = document.createElement('td');
            avgCell.className = 'avg-cell';
            avgCell.innerText = totalAvg;
            let actionCell = document.createElement('td');
            let delCadetBtn = document.createElement('button');
            delCadetBtn.innerText = '🗑️';
            delCadetBtn.className = 'delete-cadet-btn';
            delCadetBtn.onclick = () => {
                if (confirm(`Удалить курсанта ${fullName(cadet)}?`)) {
                    deleteCadet(cadet.id);
                    renderTeacherTable();
                }
            };
            actionCell.appendChild(delCadetBtn);
            row.appendChild(avgCell);
            row.appendChild(actionCell);
            tbody.appendChild(row);
        }
    }
    
    // Авторизация
    function login(loginVal, pwd) {
        let user = appData.users.find(u => u.login === loginVal && u.password === pwd && u.role === 'teacher');
        if (!user) {
            document.getElementById('loginError').innerText = 'Неверный логин или пароль';
            return false;
        }
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('teacherPanel').style.display = 'block';
        renderTeacherTable();
        return true;
    }
    
    function logout() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('teacherPanel').style.display = 'none';
        document.getElementById('loginError').innerText = '';
        document.getElementById('loginInput').value = '';
        document.getElementById('passwordInput').value = '';
    }
    
    document.getElementById('loginBtn').onclick = () => login(document.getElementById('loginInput').value.trim(), document.getElementById('passwordInput').value.trim());
    document.getElementById('logoutTeacher').onclick = logout;
    document.getElementById('addCadetBtn').onclick = () => {
        let surname = document.getElementById('newSurname').value.trim();
        let name = document.getElementById('newName').value.trim();
        let patronymic = document.getElementById('newPatronymic').value.trim();
        if (!surname || !name || !patronymic) { alert('Заполните Фамилию, Имя, Отчество'); return; }
        addCadet(surname, name, patronymic);
        renderTeacherTable();
        document.getElementById('newSurname').value = '';
        document.getElementById('newName').value = '';
        document.getElementById('newPatronymic').value = '';
        alert('Курсант добавлен');
    };
    
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginForm').style.display = 'block';
    });
</script>
</body>
</html>
